<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>公共论坛 · 所有人互通</title>
<style>
*{box-sizing:border-box}
body{background:#C0C0C0;font-family:宋体,Fixedsys;margin:0;padding:10px}
.container{width:1000px;margin:0 auto;background:#E0E0E0;border:4px outset #fff;padding:24px}
.banner{width:100%;border:2px inset #fff;margin-bottom:12px}
.banner img{width:100%}
.bar{background:#005EA0;color:#fff;padding:8px;margin:12px 0}
input,textarea{border:2px inset #fff;width:100%;padding:8px;margin-bottom:10px}
.btn{padding:8px 16px;background:#D4D0C8;border:3px outset #fff;cursor:pointer}

.post{
  background:#fff;border:2px solid #000;padding:30px;
  margin-bottom:20px;display:flex;gap:24px;
  width:840px;min-height:300px
}
.avatar{width:120px;height:120px;border:3px inset #aaa}
.avatar img{width:100%;height:100%;object-fit:cover}
.post-right{flex:1}
.title{font-size:22px;font-weight:bold;color:#000080;margin-bottom:10px}
.info{color:#444;margin-bottom:10px}
.content{font-size:16px;line-height:1.7}

.replyBtn{padding:6px 12px;background:#D4D0C8;border:2px outset #fff;cursor:pointer}
.replyBox{
  background:#fff;border:3px inset #aaa;padding:20px;margin-top:10px;margin-bottom:20px;
  width:840px;display:none
}
</style>
</head>
<body>
<div class="container">

<div class="banner">
<img src="https://s3.bmp.ovh/2026/03/01/eFsz0etr.png">
</div>

<div class="bar">昵称</div>
<input id="user" placeholder="输入名字">

<div class="bar">发新帖</div>
<input id="title" placeholder="标题">
<textarea id="content" rows="6" placeholder="内容"></textarea>
<button class="btn" onclick="sendPost()">发布帖子（所有人可见）</button>

<div class="bar">全部帖子（实时互通）</div>
<div id="list"></div>

</div>

<script>
const AVATAR = "https://s3.bmp.ovh/2026/02/25/28EVWpbb.png";
const API = "https://clubapi.workers.dev";

async function getList() {
  let r = await fetch(API+"/list");
  let list = await r.json();
  let html = "";
  list.forEach(p => {
    html+=`
<div class="post">
  <div class="avatar"><img src="${AVATAR}"></div>
  <div class="post-right">
    <div class="title">${p.title}</div>
    <div class="info">${p.user} • ${p.time}</div>
    <div class="content">${p.content}</div>
    <br>
    <button class="replyBtn" onclick="showReply(${p.id})">回复</button>
    <div class="replyBox" id="reply${p.id}">
      <textarea rows="3" id="r${p.id}" placeholder="回复内容"></textarea>
      <br>
      <button class="btn" onclick="sendReply(${p.id})">提交回复</button>
    </div>
  </div>
</div>`;
  });
  document.getElementById("list").innerHTML = html;
}

async function sendPost() {
  let user = document.getElementById("user").value || "匿名";
  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;
  if (!title||!content) return alert("填写完整");
  await fetch(API+"/post", {
    method:"POST",
    body:JSON.stringify({user,title,content})
  });
  document.getElementById("title").value="";
  document.getElementById("content").value="";
  getList();
}

function showReply(id) {
  document.querySelectorAll(".replyBox").forEach(x=>x.style.display="none");
  document.getElementById("reply"+id).style.display="block";
}

async function sendReply(id) {
  let user = document.getElementById("user").value || "匿名";
  let content = document.getElementById("r"+id).value;
  if (!content) return;
  await fetch(API+"/reply", {
    method:"POST",
    body:JSON.stringify({post_id:id, user, content})
  });
  getList();
}

getList();
setInterval(getList, 5000);
</script>
</body>
</html>
