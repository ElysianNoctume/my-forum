<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>1672-forum</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#d3d3d3;font-family:"宋体",Courier New,monospace;padding:10px}
.container{width:1000px;margin:0 auto;background:#e8e8e8;border:4px outset #fff;padding:25px}
.banner{width:100%;border:2px inset #aaa;margin-bottom:15px;position:relative}
.banner img{width:100%;display:block}
.banner-text{position:absolute;bottom:10px;right:15px;color:#fff;font-weight:bold;text-shadow:1px 1px 3px #000}
.bar{background:#06c;color:#fff;padding:8px;margin:12px 0}
input,textarea{width:100%;border:2px inset #aaa;padding:8px;margin-bottom:10px}
.btn{background:#d0d0d0;border:2px outset #fff;padding:8px 16px;cursor:pointer}
.post-item{background:#fff;border:2px solid #333;padding:30px;margin-bottom:20px;display:flex;gap:25px;min-height:250px;width:800px}
.avatar{width:100px;height:100px;border:2px inset #aaa;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.post-content{flex:1;display:flex;flex-direction:column;gap:10px}
.post-title{font-size:20px;font-weight:bold;color:#00a}
.post-info{font-size:14px;color:#555}
.post-body{font-size:16px;line-height:1.8}
</style>
</head>
<body>
<div class="container">
<div class="banner">
<img src="https://s3.bmp.ovh/2026/03/01/eFsz0etr.png">
<div class="banner-text">1672-forum</div>
</div>
<div class="bar">昵称</div>
<input id="user" placeholder="输入昵称">
<div class="bar">发布新帖</div>
<input id="title" placeholder="标题">
<textarea id="content" rows="5" placeholder="内容"></textarea>
<button class="btn" onclick="pub()">发布帖子</button>
<div class="bar">所有帖子</div>
<div id="list">加载中...</div>
</div>
<script>
const API = "https://my-forum-api.1299047066.workers.dev";
const AVATAR = "https://s3.bmp.ovh/2026/02/25/28EVWpbb.png";

async function load(){
  const r = await fetch(API+"/list");
  const list = await r.json();
  let html = "";
  list.forEach(p => {
    html += `<div class="post-item"><div class="avatar"><img src="${AVATAR}"></div><div class="post-content"><div class="post-title">${p.title}</div><div class="post-info">${p.user} • ${p.time}</div><div class="post-body">${p.content}</div></div></div>`;
  });
  document.getElementById("list").innerHTML = html;
}

async function pub(){
  const user = document.getElementById("user").value || "匿名";
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  if(!title || !content){alert("请填写完整");return;}
  await fetch(API+"/post",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user,title,content})
  });
  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  load();
}

load();
setInterval(load, 3000);
</script>
</body>
</html>
